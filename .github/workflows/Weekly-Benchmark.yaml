name: BiWeekly Benchmark Run

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:
    inputs:
      runs:
        description: 'Timed iterations per decoder'
        required: false
        default: '3'
      warmup:
        description: 'Warmup iterations per decoder'
        required: false
        default: '1'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      BENCHMARK_RUNS: ${{ github.event.inputs.runs || '3' }}
      BENCHMARK_WARMUP: ${{ github.event.inputs.warmup || '1' }}
      BENCHMARK_RUNNER: ubuntu-latest-github-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install FFmpeg 8.1 (BtbN shared build)
      env:
        FFMPEG_BUILD: 'ffmpeg-n8.1-latest-linux64-gpl-shared-8.1'
      run: |
        # Nelux's _nelux.so links against libavcodec.so.62 / libavformat.so.62
        # (ffmpeg 8.x). Ubuntu 24.04's apt ships ffmpeg 6.x, so we pull the
        # BtbN shared build instead — it carries the binary plus the
        # matching libav*/libsw* shared objects.
        sudo mkdir -p /opt/ffmpeg
        curl -fsSL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/${FFMPEG_BUILD}.tar.xz" \
          | sudo tar -xJf - -C /opt/ffmpeg --strip-components=1
        echo "/opt/ffmpeg/lib" | sudo tee /etc/ld.so.conf.d/zz-ffmpeg.conf >/dev/null
        sudo ldconfig
        echo "/opt/ffmpeg/bin" >> "$GITHUB_PATH"
        echo "LD_LIBRARY_PATH=/opt/ffmpeg/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
        /opt/ffmpeg/bin/ffmpeg -version | head -1

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Nelux (GitHub release wheel)
      env:
        NELUX_VERSION: '0.9.2'
      run: |
        # Nelux ships wheels via GitHub releases, not PyPI. Pick the wheel
        # matching the active Python tag (cp313 / cp314) for manylinux x86_64.
        py_tag=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
        wheel="nelux-${NELUX_VERSION}-${py_tag}-${py_tag}-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl"
        url="https://github.com/NevermindNilas/Nelux/releases/download/v${NELUX_VERSION}/${wheel}"
        echo "Installing ${url}"
        pip install "${url}"

    - name: Run benchmark
      run: python main.py --runs "${BENCHMARK_RUNS}" --warmup "${BENCHMARK_WARMUP}"

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Commit updated history
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add history/ || true
        if git diff --cached --quiet; then
          echo "No history changes to commit."
        else
          git commit -m "chore(benchmark): update history ${{ steps.date.outputs.date }}"
          git push
        fi

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: benchmark-${{ steps.date.outputs.date }}
        name: Benchmark Results ${{ steps.date.outputs.date }}
        body: |
          Biweekly benchmark results generated on ${{ steps.date.outputs.date }}.

          Runner: `${{ env.BENCHMARK_RUNNER }}`
          Iterations per decoder: `${{ env.BENCHMARK_RUNS }}` timed + `${{ env.BENCHMARK_WARMUP }}` warmup (median FPS reported).

          **Performance Charts**

          ***360p Benchmark:***
          ![360p Bar](https://github.com/${{ github.repository }}/releases/download/benchmark-${{ steps.date.outputs.date }}/360p_diagram.png)
          ![360p Trend](https://github.com/${{ github.repository }}/releases/download/benchmark-${{ steps.date.outputs.date }}/360p_trend.png)

          ***720p Benchmark:***
          ![720p Bar](https://github.com/${{ github.repository }}/releases/download/benchmark-${{ steps.date.outputs.date }}/720p_diagram.png)
          ![720p Trend](https://github.com/${{ github.repository }}/releases/download/benchmark-${{ steps.date.outputs.date }}/720p_trend.png)

          See attached `.json` files for detailed metrics and history.
        files: |
          360p_results.json
          720p_results.json
          360p_diagram.png
          720p_diagram.png
          history/360p_history.json
          history/720p_history.json
          history/360p_trend.png
          history/720p_trend.png
        draft: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
