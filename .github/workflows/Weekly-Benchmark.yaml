name: BiWeekly Benchmark Run

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:
    inputs:
      runs:
        description: 'Timed iterations per decoder'
        required: false
        default: '3'
      warmup:
        description: 'Warmup iterations per decoder'
        required: false
        default: '1'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      BENCHMARK_RUNS: ${{ github.event.inputs.runs || '3' }}
      BENCHMARK_WARMUP: ${{ github.event.inputs.warmup || '1' }}
      BENCHMARK_RUNNER: ubuntu-latest-github-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install core dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install optional dependencies (best-effort)
      continue-on-error: true
      run: |
        # basswood-av / celux currently lack 3.14 wheels — try anyway, the
        # benchmark backends skip cleanly when the import fails.
        pip install --only-binary=:all: -r requirements-optional.txt || true

    - name: Run benchmark
      run: python main.py --runs "${BENCHMARK_RUNS}" --warmup "${BENCHMARK_WARMUP}"

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Commit updated history
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add history/ || true
        if git diff --cached --quiet; then
          echo "No history changes to commit."
        else
          git commit -m "chore(benchmark): update history ${{ steps.date.outputs.date }}"
          git push
        fi

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: benchmark-${{ steps.date.outputs.date }}
        name: Benchmark Results ${{ steps.date.outputs.date }}
        body: |
          Biweekly benchmark results generated on ${{ steps.date.outputs.date }}.

          Runner: `${{ env.BENCHMARK_RUNNER }}`
          Iterations per decoder: `${{ env.BENCHMARK_RUNS }}` timed + `${{ env.BENCHMARK_WARMUP }}` warmup (median FPS reported).

          **Performance Charts**

          ***360p Benchmark:***
          ![360p Bar](https://github.com/${{ github.repository }}/releases/download/benchmark-${{ steps.date.outputs.date }}/360p_diagram.png)
          ![360p Trend](https://github.com/${{ github.repository }}/releases/download/benchmark-${{ steps.date.outputs.date }}/360p_trend.png)

          ***720p Benchmark:***
          ![720p Bar](https://github.com/${{ github.repository }}/releases/download/benchmark-${{ steps.date.outputs.date }}/720p_diagram.png)
          ![720p Trend](https://github.com/${{ github.repository }}/releases/download/benchmark-${{ steps.date.outputs.date }}/720p_trend.png)

          See attached `.json` files for detailed metrics and history.
        files: |
          360p_results.json
          720p_results.json
          360p_diagram.png
          720p_diagram.png
          history/360p_history.json
          history/720p_history.json
          history/360p_trend.png
          history/720p_trend.png
        draft: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
